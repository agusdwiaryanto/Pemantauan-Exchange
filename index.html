<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exchange Risk Monitor 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-gray-950 text-gray-200">
  <div class="max-w-7xl mx-auto p-6">

    <h1 class="text-4xl font-bold text-center mb-2 text-yellow-400">Exchange Risk Monitor</h1>
    <p class="text-center text-gray-400 mb-10">BitMart • LBank • CoinEx • HTX</p>

    <!-- Volume Cards -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-12" id="exchange-grid"></div>

    <!-- Official Announcements -->
    <div class="mt-12">
      <h2 class="text-2xl font-semibold mb-6">📢 Official Announcements & Delisting</h2>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="announcement-grid"></div>
    </div>
  </div>

  <script>
    const exchangeData = [
      { name: "BitMart", id: "bitmart" },
      { name: "LBank", id: "lbank" },
      { name: "CoinEx", id: "coinex" },
      { name: "HTX", id: "huobi" }   // HTX biasanya terdeteksi sebagai huobi di CoinGecko
    ];

    async function loadVolumes() {
      const grid = document.getElementById('exchange-grid');
      grid.innerHTML = '';

      for (let ex of exchangeData) {
        let volume = "N/A";
        let change = "";

        try {
          const res = await fetch(`https://api.coingecko.com/api/v3/exchanges/${ex.id}`);
          if (res.ok) {
            const data = await res.json();
            volume = data.trade_volume_24h_btc ? data.trade_volume_24h_btc.toFixed(2) + " BTC" : "N/A";
          }
        } catch (e) {
          volume = "Error";
        }

        const card = document.createElement('div');
        card.className = "bg-gray-900 border border-gray-800 rounded-2xl p-6 hover:border-yellow-500 transition";
        card.innerHTML = `
          <h3 class="text-2xl font-bold">${ex.name}</h3>
          <div class="mt-6">
            <p class="text-gray-400 text-sm">24h Trading Volume</p>
            <p class="text-3xl font-mono font-bold text-green-400 mt-1">${volume}</p>
          </div>
          <p class="text-xs text-gray-500 mt-4">Updated just now</p>
        `;
        grid.appendChild(card);
      }
    }

    // Announcements
    function loadAnnouncements() {
      const items = [
        { name: "BitMart", url: "https://www.bitmart.com/en-US/support/sections/7923014477723/45161617183387", desc: "Announcements & Delisting" },
        { name: "LBank", url: "https://www.lbank.com/support/sections/CO00000057", desc: "Delisting & Support" },
        { name: "CoinEx", url: "https://www.coinex.com/en/announcements?category=14108182730900", desc: "Official Announcements" },
        { name: "HTX", url: "https://www.htx.com/support/list/64971881385864/", desc: "Support & Announcements" }
      ];

      const container = document.getElementById('announcement-grid');
      container.innerHTML = items.map(item => `
        <a href="${item.url}" target="_blank" class="block bg-gray-900 border border-gray-800 hover:border-red-500 rounded-2xl p-6 transition">
          <h4 class="font-bold text-lg">${item.name}</h4>
          <p class="text-gray-400 text-sm mt-2">${item.desc}</p>
          <div class="mt-4 text-red-400 text-xs flex items-center gap-2">
            <i class="fas fa-external-link-alt"></i> Buka Halaman Resmi
          </div>
        </a>
      `).join('');
    }

    // Run
    window.onload = () => {
      loadVolumes();
      loadAnnouncements();
      
      // Refresh setiap 10 menit
      setInterval(loadVolumes, 600000);
    };
  </script>
</body>
</html>

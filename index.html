<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exchange Risk Monitor 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-gray-950 text-gray-200">
  <div class="max-w-7xl mx-auto p-6">

    <div class="flex justify-between items-center mb-8">
      <div>
        <h1 class="text-4xl font-bold text-yellow-400">Exchange Risk Monitor</h1>
        <p class="text-gray-400">BitMart • LBank • CoinEx • HTX</p>
      </div>
      <button onclick="refreshAll()" 
              class="bg-yellow-600 hover:bg-yellow-500 px-5 py-3 rounded-xl font-medium flex items-center gap-2 transition">
        <i class="fas fa-sync-alt"></i> Refresh Semua Data
      </button>
    </div>

    <!-- Volume Cards -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-12" id="exchange-grid"></div>

    <!-- Announcements -->
    <div class="mb-12">
      <h2 class="text-2xl font-semibold mb-6">📢 Official Announcements & Delisting</h2>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="announcement-grid"></div>
    </div>

    <!-- Twitter Embeds -->
    <div>
      <h2 class="text-2xl font-semibold mb-8">🐦 Latest Posts from Official X</h2>
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-8" id="twitter-grid"></div>
    </div>
  </div>

  <script>
    const exchanges = [
      { name: "BitMart", cg_id: "bitmart" },
      { name: "LBank", cg_id: "lbank" },
      { name: "CoinEx", cg_id: "coinex" },
      { name: "HTX", cg_id: "huobi" }
    ];

    async function loadVolumes() {
      const grid = document.getElementById('exchange-grid');
      grid.innerHTML = '';

      for (let ex of exchanges) {
        let volumeText = "Loading...";
        
        try {
          const res = await fetch(`https://api.coingecko.com/api/v3/exchanges/${ex.cg_id}`);
          if (res.ok) {
            const data = await res.json();
            const vol = data.trade_volume_24h_btc ? data.trade_volume_24h_btc.toFixed(2) : "N/A";
            volumeText = `${vol} BTC`;
          } else {
            volumeText = "N/A";
          }
        } catch (e) {
          volumeText = "Error";
        }

        const card = document.createElement('div');
        card.className = "bg-gray-900 border border-gray-800 rounded-2xl p-6 hover:border-yellow-500 transition";
        card.innerHTML = `
          <h3 class="text-2xl font-bold">${ex.name}</h3>
          <p class="text-gray-400 text-sm mt-4">24h Trading Volume</p>
          <p class="text-3xl font-mono font-bold text-green-400 mt-1">${volumeText}</p>
        `;
        grid.appendChild(card);
      }
    }

    function loadAnnouncements() {
      const items = [
        { name: "BitMart", url: "https://www.bitmart.com/en-US/support/sections/7923014477723/45161617183387" },
        { name: "LBank", url: "https://www.lbank.com/support/sections/CO00000057" },
        { name: "CoinEx", url: "https://www.coinex.com/en/announcements?category=14108182730900" },
        { name: "HTX", url: "https://www.htx.com/support/list/64971881385864/" }
      ];

      document.getElementById('announcement-grid').innerHTML = items.map(i => `
        <a href="${i.url}" target="_blank" class="block bg-gray-900 border border-gray-800 hover:border-red-500 rounded-2xl p-6 transition">
          <h4 class="font-bold">${i.name}</h4>
          <p class="text-sm text-gray-400">Official Announcements & Delisting</p>
        </a>
      `).join('');
    }

    function loadTwitterEmbeds() {
      const accounts = [
        { name: "BitMart", user: "BitMartExchange" },
        { name: "LBank", user: "LBank_Exchange" },
        { name: "CoinEx", user: "coinexcom" },
        { name: "HTX", user: "HTX_Global" }
      ];

      document.getElementById('twitter-grid').innerHTML = accounts.map(acc => `
        <div class="bg-gray-900 border border-gray-800 rounded-3xl p-6">
          <h4 class="font-bold mb-4">@${acc.user}</h4>
          <a class="twitter-timeline" 
             href="https://twitter.com/${acc.user}" 
             data-height="620" 
             data-theme="dark" 
             data-chrome="noheader nofooter transparent">
          </a>
        </div>
      `).join('');

      const script = document.createElement('script');
      script.src = "https://platform.twitter.com/widgets.js";
      script.async = true;
      document.body.appendChild(script);
    }

    function refreshAll() {
      document.getElementById('exchange-grid').innerHTML = '<p class="text-center col-span-4 py-8 text-yellow-400">Refreshing data...</p>';
      loadVolumes();
    }

    // Load semua
    window.onload = () => {
      loadVolumes();
      loadAnnouncements();
      loadTwitterEmbeds();
    };
  </script>
</body>
</html>

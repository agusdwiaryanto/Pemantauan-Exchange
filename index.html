<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exchange Risk Monitor 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: system-ui, sans-serif; }
    .card:hover { transform: translateY(-5px); }
  </style>
</head>
<body class="bg-gray-950 text-gray-200">
  <div class="max-w-7xl mx-auto p-6">

    <h1 class="text-4xl font-bold text-center mb-2 text-yellow-400">Exchange Risk Monitor</h1>
    <p class="text-center text-gray-400 mb-10">BitMart • LBank • CoinEx • HTX</p>

    <!-- Exchange Volume -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-12" id="exchange-grid"></div>

    <!-- Official Announcements & Delisting -->
    <div class="mt-12">
      <h2 class="text-2xl font-semibold mb-6 flex items-center gap-3">
        <i class="fas fa-bell text-red-400"></i> Official Announcements & Delisting
      </h2>
      
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="announcement-grid">
        <!-- Diisi oleh JS -->
      </div>
    </div>
  </div>

  <script>
    // === VOLUME DATA ===
    async function loadVolumes() {
      const grid = document.getElementById('exchange-grid');
      grid.innerHTML = exchanges.map(ex => `
        <div class="bg-gray-900 border border-gray-800 rounded-2xl p-6 card">
          <h3 class="text-2xl font-bold mb-4">${ex.name}</h3>
          <p class="text-gray-400 text-sm">24h Volume</p>
          <p class="text-3xl font-mono font-bold text-green-400 mt-1" id="${ex.id}-vol">Loading...</p>
        </div>
      `).join('');
      
      // Fetch real volume dari CoinGecko
      try {
        const res = await fetch('https://api.coingecko.com/api/v3/exchanges');
        const data = await res.json();
        // Mapping sederhana (bisa disesuaikan)
        console.log("Volume data loaded");
      } catch(e) {}
    }

    // === OFFICIAL ANNOUNCEMENTS ===
    const announcements = [
      {
        name: "BitMart",
        url: "https://www.bitmart.com/en-US/support/sections/7923014477723/45161617183387",
        desc: "Official Support & Announcements (Delisting & News)"
      },
      {
        name: "LBank",
        url: "https://www.lbank.com/support/sections/CO00000057",
        desc: "Delisting & Announcement Section"
      },
      {
        name: "CoinEx",
        url: "https://www.coinex.com/en/announcements?category=14108182730900",
        desc: "Official Announcements & Delisting"
      },
      {
        name: "HTX",
        url: "https://www.htx.com/support/list/64971881385864/",
        desc: "Support & Official Announcements"
      }
    ];

    function loadAnnouncements() {
      const container = document.getElementById('announcement-grid');
      container.innerHTML = announcements.map(item => `
        <a href="${item.url}" target="_blank" class="block bg-gray-900 border border-gray-800 hover:border-red-500 rounded-2xl p-6 card group">
          <div class="flex justify-between items-start">
            <div>
              <h3 class="text-xl font-bold group-hover:text-yellow-400">${item.name}</h3>
              <p class="text-gray-400 text-sm mt-2">${item.desc}</p>
            </div>
            <i class="fas fa-external-link-alt text-gray-500 group-hover:text-yellow-400"></i>
          </div>
          <div class="mt-6 text-xs text-red-400 flex items-center gap-2">
            <i class="fas fa-exclamation-triangle"></i>
            <span>Klik untuk buka halaman resmi</span>
          </div>
        </a>
      `).join('');
    }

    // Data Exchange
    const exchanges = [
      { id: "bitmart", name: "BitMart" },
      { id: "lbank", name: "LBank" },
      { id: "coinex", name: "CoinEx" },
      { id: "htx", name: "HTX" }
    ];

    // Init
    window.onload = () => {
      loadVolumes();
      loadAnnouncements();
    };
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exchange Risk Monitor 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    .twitter-timeline { border-radius: 16px; }
  </style>
</head>
<body class="bg-gray-950 text-gray-200">
  <div class="max-w-7xl mx-auto p-6">

    <h1 class="text-4xl font-bold text-center mb-2 text-yellow-400">Exchange Risk Monitor</h1>
    <p class="text-center text-gray-400 mb-10">BitMart • LBank • CoinEx • HTX</p>

    <!-- Volume -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-12" id="exchange-grid"></div>

    <!-- Announcements -->
    <div class="mb-12">
      <h2 class="text-2xl font-semibold mb-6">📢 Official Announcements & Delisting</h2>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="announcement-grid"></div>
    </div>

    <!-- Twitter Embeds -->
    <div class="mt-12">
      <h2 class="text-2xl font-semibold mb-8 flex items-center gap-3">
        <i class="fab fa-x-twitter"></i> Latest Posts from Official X Accounts
      </h2>
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-8" id="twitter-grid"></div>
    </div>
  </div>

  <script>
    // Volume (sederhana)
    async function loadVolumes() {
      const grid = document.getElementById('exchange-grid');
      const names = ["BitMart", "LBank", "CoinEx", "HTX"];
      grid.innerHTML = names.map(name => `
        <div class="bg-gray-900 border border-gray-800 rounded-2xl p-6 hover:border-yellow-500 transition">
          <h3 class="text-2xl font-bold">${name}</h3>
          <p class="text-gray-400 text-sm mt-4">24h Volume</p>
          <p class="text-3xl font-mono font-bold text-green-400 mt-1">Loading...</p>
        </div>
      `).join('');
    }

    // Announcements
    function loadAnnouncements() {
      const items = [
        { name: "BitMart", url: "https://www.bitmart.com/en-US/support/sections/7923014477723/45161617183387" },
        { name: "LBank", url: "https://www.lbank.com/support/sections/CO00000057" },
        { name: "CoinEx", url: "https://www.coinex.com/en/announcements?category=14108182730900" },
        { name: "HTX", url: "https://www.htx.com/support/list/64971881385864/" }
      ];

      document.getElementById('announcement-grid').innerHTML = items.map(i => `
        <a href="${i.url}" target="_blank" class="block bg-gray-900 border border-gray-800 hover:border-red-500 rounded-2xl p-6 transition">
          <h4 class="font-bold text-lg">${i.name}</h4>
          <p class="text-sm text-gray-400 mt-1">Official Announcements & Delisting</p>
        </a>
      `).join('');
    }

    // Twitter Embeds
    function loadTwitterEmbeds() {
      const accounts = [
        { name: "BitMart", username: "BitMartExchange" },
        { name: "LBank", username: "LBank_Exchange" },
        { name: "CoinEx", username: "coinexcom" },
        { name: "HTX", username: "HTX_Global" }
      ];

      const container = document.getElementById('twitter-grid');
      container.innerHTML = accounts.map(acc => `
        <div class="bg-gray-900 border border-gray-800 rounded-3xl p-6">
          <h4 class="font-bold text-lg mb-4">@${acc.username}</h4>
          <a class="twitter-timeline" 
             href="https://twitter.com/${acc.username}" 
             data-height="600" 
             data-theme="dark" 
             data-chrome="noheader nofooter noborders transparent">
          </a>
        </div>
      `).join('');

      // Load Twitter Widget Script
      const script = document.createElement('script');
      script.src = "https://platform.twitter.com/widgets.js";
      script.async = true;
      document.body.appendChild(script);
    }

    // Initialize
    window.onload = () => {
      loadVolumes();
      loadAnnouncements();
      loadTwitterEmbeds();
    };
  </script>
</body>
</html>
